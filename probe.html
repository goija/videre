<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX v26.6 // X-GRAPHQL API PROBE</title>
    <style>
        :root {
            --vortex-cyan: #00e5ff;
            --vortex-magenta: #ff00ff;
            --vortex-bg: #050505;
            --vortex-border: rgba(0, 229, 255, 0.3);
            --vortex-alert: #ff003c;
            --vortex-success: #0f0;
            --vortex-yellow: #ffcc00;
        }

        body {
            background-color: var(--vortex-bg);
            color: var(--vortex-cyan);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }

        .header {
            border-bottom: 2px solid #1DA1F2; /* Twitter Blue */
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .title { font-size: 1.5rem; color: #fff; text-shadow: 0 0 8px #1DA1F2; font-weight: bold; }
        .subtitle { color: var(--vortex-yellow); font-size: 0.9rem; margin-top: 5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .panel {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--vortex-border);
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; color: #1DA1F2; font-size: 0.8rem; margin-bottom: 5px; font-weight: bold;}
        
        input[type="text"], textarea {
            width: 100%; background: #000; border: 1px solid var(--vortex-cyan); color: #fff;
            padding: 10px; font-family: monospace; box-sizing: border-box; outline: none;
        }

        textarea { height: 80px; resize: vertical; }

        button {
            background: rgba(29, 161, 242, 0.1); border: 1px solid #1DA1F2; color: #1DA1F2; 
            padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase;
            transition: 0.2s; width: 100%;
        }

        button:hover { background: #1DA1F2; color: #fff; box-shadow: 0 0 10px rgba(29, 161, 242, 0.5); }

        .terminal {
            background: #000; border: 1px solid var(--vortex-yellow); height: 400px;
            overflow-y: auto; padding: 15px; font-size: 0.85rem; color: #aaa;
        }

        .log-time { color: #555; margin-right: 10px; }
        .log-err { color: var(--vortex-alert); }
        .log-succ { color: var(--vortex-success); }
        .log-warn { color: var(--vortex-yellow); }
        .log-sys { color: var(--vortex-cyan); }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">VORTEX OMNI-BRIDGE // X-GRAPHQL PAYLOAD EXECUTOR</div>
        <div class="subtitle">TARGET: api.x.com / api.twitter.com | STATUS: ARMED</div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3 style="margin-top:0; color: #fff;">[ AUTHENTICATION & HEADERS ]</h3>
            <div class="input-group">
                <label>x-csrf-token (ct0 cookie)</label>
                <input type="text" id="csrf-token" placeholder="Bv. a1b2c3d4e5f6...">
            </div>
            <div class="input-group">
                <label>Authorization (Bearer)</label>
                <input type="text" id="auth-token" value="Bearer AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA">
            </div>
        </div>

        <div class="panel">
            <h3 style="margin-top:0; color: #fff;">[ GRAPHQL TARGET ]</h3>
            <div class="input-group">
                <label>Endpoint URL (Query ID)</label>
                <input type="text" id="target-url" value="https://x.com/i/api/graphql/UserByScreenName">
            </div>
            <div class="input-group">
                <label>Variables (JSON Payload)</label>
                <textarea id="variables-json">{"screen_name":"andremilek1","withSafetyModeUserFields":true}</textarea>
            </div>
        </div>
    </div>
    
    <button onclick="executeGraphQLProbe()">FIRE GRAPHQL PROBE</button>

    <div class="terminal" id="terminal">
        <div><span class="log-time">[SYS]</span> X/Twitter GraphQL Module geladen. Klaar voor injectie.</div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');

        function getTimestamp() {
            const now = new Date();
            return `[${now.toISOString().split('T')[1].slice(0, -1)}]`;
        }

        function log(msg, type = 'log-sys') {
            const div = document.createElement('div');
            div.innerHTML = `<span class="log-time">${getTimestamp()}</span> <span class="${type}">${msg}</span>`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function executeGraphQLProbe() {
            const url = document.getElementById('target-url').value;
            const csrf = document.getElementById('csrf-token').value;
            const auth = document.getElementById('auth-token').value;
            const vars = document.getElementById('variables-json').value;
            
            log(`Formulating GraphQL query to: ${url}`, 'log-sys');
            
            const headers = {
                'Accept': '*/*',
                'Content-Type': 'application/json',
                'Authorization': auth,
                'x-twitter-auth-type': 'OAuth2Session',
                'x-twitter-active-user': 'yes',
                'x-twitter-client-language': 'nl'
            };

            if (csrf) {
                headers['x-csrf-token'] = csrf;
                log(`Injecting CSRF (ct0) token.`, 'log-warn');
            } else {
                log(`Waarschuwing: Geen CSRF token. X/Twitter zal waarschijnlijk een 403 Forbidden of 400 Bad Request retourneren voor POST requests.`, 'log-warn');
            }

            try {
                // X APIs use URL parameters for GET GraphQL, but we simulate POST here for payload injection
                const features = {"hidden_profile_likes_enabled":true,"hidden_profile_subscriptions_enabled":true,"responsive_web_graphql_exclude_directive_enabled":true,"verified_phone_label_enabled":false,"subscriptions_verification_info_is_identity_verified_enabled":true,"subscriptions_verification_info_verified_since_enabled":true,"highlights_tweets_tab_ui_enabled":true,"responsive_web_twitter_article_notes_tab_enabled":true,"creator_subscriptions_tweet_preview_api_enabled":true,"responsive_web_graphql_skip_user_profile_image_extensions_enabled":false,"responsive_web_graphql_timeline_navigation_enabled":true};
                
                const fullUrl = `${url}?variables=${encodeURIComponent(vars)}&features=${encodeURIComponent(JSON.stringify(features))}`;

                log(`Initiating cross-origin fetch sequence...`, 'log-sys');

                const response = await fetch(fullUrl, {
                    method: 'GET',
                    headers: headers,
                    mode: 'cors'
                });

                if (!response.ok) {
                    log(`HTTP Error: ${response.status} ${response.statusText}`, 'log-err');
                    if (response.status === 401) log(`> Oorzaak: Ongeldige of verlopen Bearer token (Guest token expiratiedatum bereikt).`, 'log-err');
                    if (response.status === 403) log(`> Oorzaak: Ontbrekende x-csrf-token / sessie-mismatch.`, 'log-err');
                    if (response.status === 429) log(`> Oorzaak: API Rate limit overschreden (Too Many Requests).`, 'log-err');
                } else {
                    log(`Success: HTTP 200 OK`, 'log-succ');
                    const data = await response.json();
                    log(`Data geëxtraheerd. Check browser console voor volledige JSON dump.`, 'log-succ');
                    console.log(data);
                }
            } catch (error) {
                log(`Network/CORS Exception: ${error.message}`, 'log-err');
                log(`De server blokkeert de request via CORS (Cross-Origin Resource Sharing). Test lokaal met gedeactiveerde web-security of via de VORTEX Proxy.`, 'log-warn');
            }
        }
    </script>
</body>
</html>
