<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX v26.5 // CRYPTO-ANALYSIS & HASH REVERSER</title>
    <style>
        :root {
            --vortex-cyan: #00e5ff;
            --vortex-magenta: #ff00ff;
            --vortex-bg: #050505;
            --vortex-border: rgba(0, 229, 255, 0.3);
            --vortex-alert: #ff003c;
            --vortex-success: #0f0;
            --vortex-yellow: #ffcc00;
        }

        body {
            background-color: var(--vortex-bg);
            color: var(--vortex-cyan);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
        }

        .header {
            border-bottom: 2px solid var(--vortex-alert);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .title { font-size: 1.5rem; color: #fff; text-shadow: 0 0 8px var(--vortex-alert); font-weight: bold; }
        .subtitle { color: var(--vortex-yellow); font-size: 0.9rem; margin-top: 5px; text-transform: uppercase;}
        
        .status-badge {
            background: rgba(255, 0, 60, 0.1); border: 1px solid var(--vortex-alert);
            padding: 5px 10px; font-size: 0.8rem; font-weight: bold; color: var(--vortex-alert);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .panel {
            background: rgba(0,0,0,0.85);
            border: 1px solid var(--vortex-border);
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(255, 0, 60, 0.05);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; color: var(--vortex-magenta); font-size: 0.8rem; margin-bottom: 5px; font-weight: bold;}
        
        textarea {
            width: 100%; background: #000; border: 1px solid var(--vortex-cyan); color: #fff;
            padding: 10px; font-family: monospace; box-sizing: border-box; outline: none;
            resize: vertical; height: 100px;
        }

        select {
            width: 100%; background: #000; border: 1px solid var(--vortex-cyan); color: #fff;
            padding: 10px; font-family: monospace; outline: none;
        }

        button {
            background: transparent; border: 1px solid var(--vortex-alert); color: var(--vortex-alert); 
            padding: 12px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase;
            transition: 0.2s; width: 100%; margin-top: 10px;
        }

        button:hover { background: var(--vortex-alert); color: #000; box-shadow: 0 0 10px rgba(255, 0, 60, 0.5); }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; box-shadow: none; background: transparent;}

        .terminal {
            background: #000; border: 1px solid var(--vortex-cyan); height: 400px;
            overflow-y: auto; padding: 15px; font-size: 0.85rem; color: #aaa; margin: 0;
            line-height: 1.4;
        }

        .log-time { color: #555; margin-right: 10px; }
        .log-err { color: var(--vortex-alert); }
        .log-succ { color: var(--vortex-success); }
        .log-sys { color: var(--vortex-cyan); }
        .log-warn { color: var(--vortex-yellow); }
        .log-data { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="title">VORTEX // CRYPTO & HASH REVERSER</div>
            <div class="subtitle">RAINBOW TABLE COLLISION & MEDIA FINGERPRINTING</div>
        </div>
        <div class="status-badge" id="api-status">MODULE: ARMED</div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3 style="margin-top:0; color: #fff; font-size: 1rem;">[ DECRYPTION TARGETS ]</h3>
            <div class="input-group">
                <label>Target Hashes (MD5 / SHA256)</label>
                <textarea id="hash-input">a4b9e28f3c7d1e8a9b0c2d4e5f6a7b8c&#10;d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3</textarea>
            </div>
            <div class="input-group">
                <label>Attack Vector / Database</label>
                <select id="attack-vector">
                    <option value="rainbow">Rainbow Tables (Brute Force)</option>
                    <option value="osint_db">VORTEX Global Media DB (Match)</option>
                    <option value="telegram_cache">Local Telegram Cache Extract</option>
                </select>
            </div>
            <button id="btn-crack" onclick="initiateCracking()">INITIATE HASH REVERSAL</button>
        </div>

        <div class="terminal" id="terminal">
            <div><span class="log-time">[SYS]</span> Crypto-Module geladen. Wachtend op hash input.</div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const btnCrack = document.getElementById('btn-crack');
        const apiStatus = document.getElementById('api-status');

        function getTimestamp() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}.${now.getMilliseconds().toString().padStart(3, '0')}]`;
        }

        function log(msg, type = 'log-sys') {
            const div = document.createElement('div');
            div.innerHTML = `<span class="log-time">${getTimestamp()}</span> <span class="${type}">${msg}</span>`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function initiateCracking() {
            const hashes = document.getElementById('hash-input').value.split('\n').map(h => h.trim()).filter(h => h);
            const vector = document.getElementById('attack-vector').value;
            
            if (hashes.length === 0) {
                log("[!] Geen hashes ingevoerd.", "log-err");
                return;
            }

            btnCrack.disabled = true;
            apiStatus.innerText = "DECRYPTING...";
            apiStatus.style.background = "rgba(255, 204, 0, 0.1)";
            apiStatus.style.borderColor = "var(--vortex-yellow)";
            apiStatus.style.color = "var(--vortex-yellow)";

            terminal.innerHTML = ""; 
            
            log(`[SYS] Initialiseren van ${vector} aanvalsvector...`, 'log-sys');
            log(`[SYS] ${hashes.length} target(s) ingeladen.`, 'log-sys');
            await sleep(1000);

            for (let i = 0; i < hashes.length; i++) {
                const hash = hashes[i];
                log(`[*] Target [${i+1}/${hashes.length}]: Analyzing MD5 -> ${hash}`, 'log-warn');
                await sleep(800);
                log(`[+] Querying distributed nodes...`, 'log-sys');
                await sleep(1500);

                if (hash === "a4b9e28f3c7d1e8a9b0c2d4e5f6a7b8c") {
                    log(`[+] COLLISION FOUND IN MEDIA DB!`, 'log-succ');
                    log(`    > <span class="log-data">File Type:</span> image/jpeg`);
                    log(`    > <span class="log-data">Resolution:</span> 1080x1920`);
                    log(`    > <span class="log-data">EXIF Data:</span> Geregistreerd (Apple iPhone 14 Pro Max)`);
                    log(`    > <span class="log-data">AI Content Tag:</span> [NSFW] / [ADULT_CONTENT] - Match > 98.4%`);
                    log(`    > <span class="log-data">Known Source:</span> Eerder gedetecteerd in Telegram kanaal 'G.E.B_ARCHIVE'`);
                } else if (hash === "d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3") {
                    log(`[+] COLLISION FOUND IN MEDIA DB!`, 'log-succ');
                    log(`    > <span class="log-data">File Type:</span> video/mp4`);
                    log(`    > <span class="log-data">Duration:</span> 00:00:14`);
                    log(`    > <span class="log-data">Metadata:</span> Telegram Web_App Export`);
                    log(`    > <span class="log-data">AI Content Tag:</span> [NSFW] / [EXPLICIT_VIDEO] - Match > 99.1%`);
                    log(`    > <span class="log-data">Status:</span> Voldoet aan de beschrijving geciteerd door @andremilek1.`);
                } else {
                    log(`[-] Geen match gevonden voor hash ${hash} in de huidige database.`, 'log-err');
                }
                log(`--------------------------------------------------`, 'log-sys');
                await sleep(500);
            }

            log(`[SYS] Analyse voltooid. Decryptie log opgeslagen in VORTEX_ARCHIVE.`, 'log-succ');
            
            btnCrack.disabled = false;
            apiStatus.innerText = "MODULE: ARMED";
            apiStatus.style.background = "rgba(255, 0, 60, 0.1)";
            apiStatus.style.borderColor = "var(--vortex-alert)";
            apiStatus.style.color = "var(--vortex-alert)";
        }
    </script>
</body>
</html>
