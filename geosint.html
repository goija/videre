<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX v26.6 // LIVE GEOINT MAPPING</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        :root {
            --vortex-cyan: #00e5ff;
            --vortex-magenta: #ff00ff;
            --vortex-bg: #050505;
            --vortex-border: rgba(0, 229, 255, 0.3);
            --vortex-alert: #ff003c;
            --vortex-yellow: #ffcc00;
        }

        body {
            background-color: var(--vortex-bg); color: var(--vortex-cyan);
            font-family: 'Courier New', Courier, monospace; padding: 20px;
            margin: 0;
        }

        .header { border-bottom: 2px solid var(--vortex-yellow); padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 1.5rem; color: #fff; text-shadow: 0 0 8px var(--vortex-yellow); font-weight: bold; }
        .subtitle { color: #888; font-size: 0.9rem; margin-top: 5px; text-transform: uppercase;}
        
        .panel {
            background: rgba(0,0,0,0.85); border: 1px solid var(--vortex-yellow); padding: 2px;
            box-shadow: inset 0 0 15px rgba(255, 204, 0, 0.05);
        }

        /* Styling voor de Leaflet Kaart container */
        #vortex-map {
            width: 100%;
            height: 600px;
            background: #111;
            z-index: 1; /* Voorkomt overlap issues */
        }
        
        /* Custom styling voor de popup box op de kaart */
        .leaflet-popup-content-wrapper {
            background: rgba(0,0,0,0.9);
            color: var(--vortex-cyan);
            border: 1px solid var(--vortex-alert);
            border-radius: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        .leaflet-popup-tip { background: var(--vortex-alert); }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">VORTEX // LIVE GEO-TRACKER MODULE</div>
        <div class="subtitle">TARGET: 52.3792, 4.887466 | LIVE OPENSTREETMAP FEED (DARK TILESET)</div>
    </div>

    <div class="panel">
        <div id="vortex-map"></div>
    </div>

    <script>
        // Initialiseer de kaart en zet het middelpunt op de EXIF coördinaten
        var map = L.map('vortex-map').setView([52.3792, 4.887466], 16);

        // Laad de "Dark Matter" tiles van CartoDB (Geen API key nodig, perfect voor donkere thema's)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Voeg een tactische rode cirkel/marker toe op de exacte locatie
        var marker = L.circleMarker([52.3792, 4.887466], {
            color: '#ff003c',
            fillColor: '#ff003c',
            fillOpacity: 0.6,
            radius: 20
        }).addTo(map);

        // Voeg data toe aan de popup
        marker.bindPopup("<b>[TARGET LOCATED]</b><br>Device: iPhone 14 Pro Max<br>Lat: 52°22'45.12\" N<br>Lon: 4°53'14.88\" E").openPopup();
    </script>
</body>
</html>
